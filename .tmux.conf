# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
# set -ag status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Flat separators for status modules
# set -g @catppuccin_window_left_separator  " █"
# set -g @catppuccin_window_left_separator  "█"
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_window_middle_separator ""
# set -g @catppuccin_status_left_separator  " █"
set -g @catppuccin_status_left_separator  "█"
set -g @catppuccin_status_right_separator " "

set -ag @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

# Other Catppuccin options
set -g @catppuccin_window_tabs_enabled on
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "directory"

# Active/inactive pane distinction
set -g window-active-style 'bg=#24273A'
set -g window-style 'bg=#1e2030'

# Resurrect/Continuum
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-boot 'on'
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Overrides after TPM (Catppuccin sets these, so they must come last)
# Copy-mode / visual selection: peach bg, dark base text for contrast
set -g mode-style "bg=#fab387,fg=#1e1e2e"
set -g pane-border-lines single
set -g pane-border-style 'fg=#1e2030,bg=#1e2030'
set -g pane-active-border-style 'fg=#1e2030,bg=#1e2030'
# Pink border line
# set -g pane-active-border-style 'fg=#fbb9eb'
set -g status-style 'bg=#24273A'
